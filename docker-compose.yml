version: '3.8'

services:
  mongo:
    image: mongo:6
    container_name: unidev-mongo
    ports:
      - "27017:27017"
    volumes:
      - datos-mongo:/data/db
    networks:
      - unidev-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: unidev-api
    ports:
      - "3000:3000"
    environment:
      - DB_CONNECTION=mongodb://mongo:27017/unidev
      - PORT=3000
    volumes:
      - ./src:/app/src
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - unidev-net

volumes:
  datos-mongo:

networks:
  unidev-net:
    driver: bridge